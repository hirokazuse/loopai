<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Chat Hub — Console Prototype Ver0.2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap');

:root{
  --bg:#12181C;
  --panel:#1B2328;
  --panel-raised:#212B31;
  --line: #2B363C;
  --text:#E8EDEF;
  --muted:#7C8B93;
  --amber:#E8A33D;
  --amber-dim: rgba(232,163,61,0.14);
  --redirect:#D9573B;
  --redirect-dim: rgba(217,87,59,0.14);
  --idle:#4C6470;
  --done:#5FAE7A;
  --done-dim: rgba(95,174,122,0.14);
  --system:#6B7A85;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans JP', 'Hiragino Sans', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  display:flex;
  justify-content:center;
  padding:24px;
  min-height:100vh;
}
.rig{
  width:100%;
  max-width:920px;
  display:grid;
  grid-template-columns:180px 1fr;
  gap:16px;
}
@media (max-width:700px){
  .rig{grid-template-columns:1fr;}
  .rail{order:2; display:flex; flex-direction:row; overflow-x:auto; gap:8px;}
}

/* ---------- Rail (checkpoints) ---------- */
.rail{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  align-self:start;
  min-height:200px;
}
.rail-title{
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:0.08em;
  color:var(--muted);
  text-transform:uppercase;
  padding:0 6px 6px;
  border-bottom:1px solid var(--line);
  margin-bottom:2px;
}
.checkpoint{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 8px;
  border-radius:7px;
  cursor:pointer;
  border:1px solid transparent;
  font-size:12.5px;
  color:var(--text);
  transition:background .12s, border-color .12s;
}
.checkpoint:hover{
  background:var(--panel-raised);
  border-color:var(--line);
}
.checkpoint .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--amber);
  flex:none;
  box-shadow:0 0 0 3px var(--amber-dim);
}
.checkpoint .label{
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.checkpoint .idx{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
}
.rail-empty{
  color:var(--muted);
  font-size:11.5px;
  padding:8px 6px;
  line-height:1.6;
}
.rail-hint{
  margin-top:auto;
  font-size:10.5px;
  color:var(--muted);
  padding:8px 6px 0;
  border-top:1px solid var(--line);
  line-height:1.6;
}

/* ---------- Main console ---------- */
.console{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  display:flex;
  flex-direction:column;
  min-height:560px;
  overflow:hidden;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  gap:12px;
}
.connectors-wrap{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.connectors{
  display:flex;
  gap:6px;
}
.connectors-hint{
  font-size:9.5px;
  color:var(--muted);
  letter-spacing:0.02em;
}
.connbtn{
  font-family:var(--mono);
  font-size:11px;
  padding:5px 10px;
  border-radius:6px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all .12s;
}
.connbtn.active{
  color:var(--bg);
  background:var(--amber);
  border-color:var(--amber);
}
.state-indicator{
  display:flex;
  align-items:center;
  gap:7px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.04em;
}
.led{
  width:8px;height:8px;border-radius:50%;
  background:var(--idle);
  transition:background .2s, box-shadow .2s;
}
.led.generating{
  background:var(--amber);
  box-shadow:0 0 0 4px var(--amber-dim);
  animation:pulse 1s infinite;
}
.led.interrupted{
  background:var(--redirect);
  box-shadow:0 0 0 4px var(--redirect-dim);
}
.led.waiting{
  background:#5FAE7A;
  box-shadow:0 0 0 4px rgba(95,174,122,0.14);
}
@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:.45;}
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:18px 16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.msg{
  max-width:82%;
  padding:10px 13px;
  border-radius:9px;
  font-size:13.5px;
  line-height:1.65;
  position:relative;
}
.msg.user{
  align-self:flex-end;
  background:var(--panel-raised);
  border:1px solid var(--line);
}
.msg.ai{
  align-self:flex-start;
  background:#182024;
  border:1px solid var(--line);
}
.msg.redirect{
  align-self:flex-end;
  background:var(--redirect-dim);
  border:1px solid rgba(217,87,59,0.4);
}
/* forward messages are now visually distinct system events, not chat bubbles */
.msg.forward{
  align-self:center;
  background:transparent;
  border:1px dashed var(--system);
  max-width:70%;
  padding:6px 12px;
  font-size:11px;
  color:var(--system);
}
.msg.forward .meta{
  color:var(--system);
}
.msg.forward .fwd-body{
  font-size:11px;
  color:var(--muted);
  font-style:italic;
}
.fwd-row{
  display:flex;
  gap:6px;
  margin-top:8px;
  flex-wrap:wrap;
}
.fwd-btn{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.02em;
  padding:5px 9px;
  border-radius:6px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all .12s;
}
.fwd-btn:hover:not(:disabled){
  color:var(--amber);
  border-color:var(--amber-dim);
  background:var(--amber-dim);
}
.fwd-btn:disabled{
  opacity:0.4;
  cursor:not-allowed;
}
.msg .meta{
  font-family:var(--mono);
  font-size:9.5px;
  color:var(--muted);
  margin-bottom:4px;
  letter-spacing:0.04em;
  display:flex;
  gap:6px;
  align-items:center;
}
.msg.interruptedmark{
  border-style:dashed;
  opacity:0.75;
}
.cursor{
  display:inline-block;
  width:6px;height:12px;
  background:var(--amber);
  margin-left:2px;
  vertical-align:middle;
  animation:blink 0.9s infinite;
}
@keyframes blink{50%{opacity:0;}}

.flag{
  align-self:center;
  font-family:var(--mono);
  font-size:10px;
  color:var(--amber);
  border:1px solid var(--amber-dim);
  background:var(--amber-dim);
  padding:3px 10px;
  border-radius:20px;
  letter-spacing:0.05em;
}

/* completion marker */
.done-flag{
  align-self:center;
  font-family:var(--mono);
  font-size:10px;
  color:var(--done);
  border:1px solid rgba(95,174,122,0.4);
  background:var(--done-dim);
  padding:4px 12px;
  border-radius:20px;
  letter-spacing:0.05em;
  display:flex;
  align-items:center;
  gap:6px;
}
.done-flag .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--done);
}

/* ---------- Input dock ---------- */
.dock{
  border-top:1px solid var(--line);
  padding:12px 16px 14px;
  background:var(--panel);
}
.dock-label{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:0.06em;
  min-height:12px;
  display:flex;
  gap:8px;
  align-items:center;
}
.dock-label.redirect-mode{color:var(--redirect);}
.input-row{
  display:flex;
  gap:8px;
  align-items:flex-end;
}
textarea{
  flex:1;
  resize:none;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:8px;
  color:var(--text);
  font-family:var(--sans);
  font-size:13.5px;
  padding:10px 12px;
  min-height:42px;
  max-height:120px;
  outline:none;
  transition:border-color .15s;
}
textarea:focus{border-color:var(--muted);}
.dock.redirect textarea{border-color:var(--redirect);}
.btn{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:0.03em;
  padding:10px 16px;
  border-radius:8px;
  border:1px solid var(--line);
  cursor:pointer;
  transition:all .12s;
  white-space:nowrap;
}
.btn-send{
  background:var(--amber);
  color:var(--bg);
  border-color:var(--amber);
}
.btn-send:hover{filter:brightness(1.08);}
.btn-send:disabled{
  background:var(--panel-raised);
  color:var(--muted);
  border-color:var(--line);
  cursor:not-allowed;
}
.btn-stop{
  background:transparent;
  color:var(--redirect);
  border-color:var(--redirect);
}
.btn-stop:hover{background:var(--redirect-dim);}
.btn-checkpoint{
  background:transparent;
  color:var(--muted);
  border-color:var(--line);
  font-size:11px;
  padding:9px 12px;
}
.btn-checkpoint:hover{color:var(--text); border-color:var(--muted);}

.controls-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-top:8px;
}
.checkpoint-hint{
  font-size:9.5px;
  color:var(--muted);
  letter-spacing:0.02em;
}
.controls-right{
  display:flex;
  gap:8px;
}
</style>
</head>
<body>

<div class="rig">
  <div class="rail">
    <div class="rail-title">Checkpoints</div>
    <div id="checkpointList"></div>
    <div class="rail-hint">後で会話を戻したい場面（この方向で確定、など）で「ここにCheckpoint」を押すと、その時点まで巻き戻せます。</div>
  </div>

  <div class="console">
    <div class="topbar">
      <div class="connectors-wrap">
        <div class="connectors" id="connectors"></div>
        <div class="connectors-hint">次の回答を担当するAIを選べます</div>
      </div>
      <div class="state-indicator">
        <div class="led" id="led"></div>
        <span id="stateLabel">IDLE</span>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="dock" id="dock">
      <div class="dock-label" id="dockLabel">通常入力</div>
      <div class="input-row">
        <textarea id="input" placeholder="AIに聞きたいことを入力…" rows="1"></textarea>
        <button class="btn btn-send" id="sendBtn">送信</button>
      </div>
      <div class="controls-row">
        <div class="checkpoint-hint" id="checkpointHint" style="visibility:hidden;">やり取りが一段落したら「ここにCheckpoint」で保存できます</div>
        <div class="controls-right">
          <button class="btn btn-stop" id="stopBtn" style="display:none;">停止</button>
          <button class="btn btn-checkpoint" id="checkpointBtn" style="display:none;">ここにCheckpoint</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ---------------- Conversation state machine ---------------- */
const STATES = { IDLE:'idle', GENERATING:'generating', INTERRUPTED:'interrupted', WAITING:'waitingUser' };

const CONNECTORS = [
  { id:'claude', label:'Claude', speedMs: 34,
    say: (q)=>`(Claude) 「${q}」について整理すると、まず前提を確認し、次に具体的な手順に分解して進めるのが良さそうです。ここまでで方向性が合っているか教えてください。` },
  { id:'chatgpt', label:'ChatGPT', speedMs: 26,
    say: (q)=>`(ChatGPT) ご質問「${q}」ですね。いくつか選択肢がありますが、まずは一番シンプルな方法から試すのがおすすめです。` },
  { id:'gemini', label:'Gemini', speedMs: 20,
    say: (q)=>`(Gemini) 「${q}」に関連する情報を整理しました。関連する要因は複数あるため、優先順位をつけて進めましょう。` },
];

const state = {
  status: STATES.IDLE,
  activeConnector: CONNECTORS[0].id,
  history: [],           // { role: 'user'|'ai'|'redirect'|'forward', text, connector, interrupted? }
  checkpoints: [],        // { id, index, label }
  genTimer: null,
  genBuffer: '',
  genTarget: '',
  genMsgIndex: null,
};

let checkpointCounter = 0;

/* ---------------- DOM refs ---------------- */
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const checkpointBtn = document.getElementById('checkpointBtn');
const checkpointHintEl = document.getElementById('checkpointHint');
const dockEl = document.getElementById('dock');
const dockLabel = document.getElementById('dockLabel');
const ledEl = document.getElementById('led');
const stateLabelEl = document.getElementById('stateLabel');
const connectorsEl = document.getElementById('connectors');
const checkpointListEl = document.getElementById('checkpointList');

/* ---------------- Connector selector ---------------- */
function renderConnectors(){
  connectorsEl.innerHTML = '';
  CONNECTORS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'connbtn' + (c.id===state.activeConnector ? ' active':'');
    b.textContent = c.label;
    b.title = '次の回答を' + c.label + 'が担当します';
    b.disabled = state.status === STATES.GENERATING;
    b.onclick = ()=>{ state.activeConnector = c.id; renderConnectors(); };
    connectorsEl.appendChild(b);
  });
}

/* ---------------- Rendering ---------------- */
function renderState(){
  const map = {
    idle: {cls:'', label:'IDLE'},
    generating: {cls:'generating', label:'GENERATING'},
    interrupted: {cls:'interrupted', label:'INTERRUPTED'},
    waitingUser: {cls:'waiting', label:'WAITING_USER'},
  };
  const s = map[state.status];
  ledEl.className = 'led ' + s.cls;
  stateLabelEl.textContent = s.label;

  const generating = state.status === STATES.GENERATING;
  const interrupted = state.status === STATES.INTERRUPTED;
  const hasHistory = state.history.length > 0;

  sendBtn.disabled = generating;
  sendBtn.textContent = interrupted ? '方向修正を送信' : '送信';
  stopBtn.style.display = generating ? 'inline-block' : 'none';
  checkpointBtn.style.display = (hasHistory && !generating) ? 'inline-block' : 'none';
  checkpointHintEl.style.visibility = (hasHistory && !generating) ? 'visible' : 'hidden';

  dockEl.classList.toggle('redirect', interrupted);
  dockLabel.classList.toggle('redirect-mode', interrupted);
  dockLabel.textContent = interrupted ? '方向修正入力 — このまま送ると停止地点から会話を修正します' : '通常入力';
  inputEl.placeholder = interrupted ? '違う方向に進んでいたら、ここで修正内容を入力…' : 'AIに聞きたいことを入力…';

  renderConnectors();
}

function renderChat(){
  chatEl.innerHTML = '';
  state.history.forEach((m, i)=>{
    // checkpoint flag before this message if one points here
    const cp = state.checkpoints.find(c=>c.index===i);
    if(cp){
      const flag = document.createElement('div');
      flag.className = 'flag';
      flag.textContent = `◆ ${cp.label}`;
      chatEl.appendChild(flag);
    }

    if(m.role === 'forward'){
      const div = document.createElement('div');
      div.className = 'msg forward';
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `転送: ${m.fromLabel} → ${m.toLabel}`;
      div.appendChild(meta);
      const body = document.createElement('div');
      body.className = 'fwd-body';
      body.textContent = m.text;
      div.appendChild(body);
      chatEl.appendChild(div);
      return;
    }

    const div = document.createElement('div');
    div.className = 'msg ' + (m.role==='user' ? 'user' : m.role==='redirect' ? 'redirect' : 'ai');
    if(m.interrupted) div.classList.add('interruptedmark');
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = m.role==='ai' ? (m.connectorLabel||'') + (m.interrupted?' · stopped':'') :
                        m.role==='redirect' ? '方向修正' : 'you';
    div.appendChild(meta);
    const body = document.createElement('div');
    body.textContent = m.text;
    div.appendChild(body);

    const isStreaming = state.status===STATES.GENERATING && i===state.genMsgIndex;
    if(m.role==='ai' && !isStreaming){
      const fwdRow = document.createElement('div');
      fwdRow.className = 'fwd-row';
      CONNECTORS.filter(c=>c.id!==m.connector).forEach(target=>{
        const b = document.createElement('button');
        b.className = 'fwd-btn';
        b.textContent = `→ ${target.label}へ転送`;
        b.disabled = state.status === STATES.GENERATING;
        b.onclick = ()=>forwardTo(m, target.id);
        fwdRow.appendChild(b);
      });
      div.appendChild(fwdRow);
    }

    chatEl.appendChild(div);
  });

  // trailing checkpoint at very end
  const trailingCp = state.checkpoints.find(c=>c.index===state.history.length);
  if(trailingCp){
    const flag = document.createElement('div');
    flag.className = 'flag';
    flag.textContent = `◆ ${trailingCp.label}`;
    chatEl.appendChild(flag);
  }

  // completion marker: shown when waiting for user after an AI reply with no pending generation
  if(state.status === STATES.WAITING && state.history.length > 0){
    const doneFlag = document.createElement('div');
    doneFlag.className = 'done-flag';
    doneFlag.innerHTML = '<span class="dot"></span>回答が完了しました';
    chatEl.appendChild(doneFlag);
  }

  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderCheckpoints(){
  checkpointListEl.innerHTML = '';
  if(state.checkpoints.length===0){
    const e = document.createElement('div');
    e.className = 'rail-empty';
    e.textContent = '（まだCheckpointはありません）';
    checkpointListEl.appendChild(e);
    return;
  }
  state.checkpoints.forEach(cp=>{
    const row = document.createElement('div');
    row.className = 'checkpoint';
    row.innerHTML = `<div class="dot"></div><div class="label">${cp.label}</div><div class="idx">#${cp.index}</div>`;
    row.onclick = ()=>rewindTo(cp);
    checkpointListEl.appendChild(row);
  });
}

function render(){
  renderState();
  renderChat();
  renderCheckpoints();
}

/* ---------------- Actions ---------------- */
function autoresize(){
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoresize);
inputEl.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});

function handleSend(){
  const text = inputEl.value.trim();
  if(!text || state.status===STATES.GENERATING) return;

  if(state.status===STATES.INTERRUPTED){
    state.history.push({role:'redirect', text});
  } else {
    state.history.push({role:'user', text});
  }
  inputEl.value = '';
  autoresize();
  startGeneration(text);
}

function startGeneration(promptText){
  state.status = STATES.GENERATING;
  const connector = CONNECTORS.find(c=>c.id===state.activeConnector);
  const full = connector.say(promptText);
  state.genTarget = full;
  state.genBuffer = '';

  state.history.push({role:'ai', text:'', connector:connector.id, connectorLabel:connector.label});
  state.genMsgIndex = state.history.length - 1;
  render();

  let i = 0;
  state.genTimer = setInterval(()=>{
    if(i>=full.length){
      clearInterval(state.genTimer);
      state.genTimer = null;
      state.status = STATES.WAITING;
      render();
      return;
    }
    state.genBuffer += full[i];
    state.history[state.genMsgIndex].text = state.genBuffer;
    i++;
    renderChat();
  }, connector.speedMs);
}

/* Stop(): Conversation-level event — Driver/Connector specifics are hidden here */
function handleStop(){
  if(state.status !== STATES.GENERATING) return;
  clearInterval(state.genTimer);
  state.genTimer = null;
  state.history[state.genMsgIndex].interrupted = true;
  state.status = STATES.INTERRUPTED;
  render();
  inputEl.focus();
}

/* forwardTo(): copy a message's text into another Connector's input and send it,
   mirroring "readLastResponse() -> send()" on the Connector interface */
function forwardTo(message, targetConnectorId){
  if(state.status === STATES.GENERATING) return;
  const target = CONNECTORS.find(c=>c.id===targetConnectorId);
  state.history.push({
    role:'forward',
    text: message.text,
    fromLabel: CONNECTORS.find(c=>c.id===message.connector).label,
    toLabel: target.label
  });
  state.activeConnector = targetConnectorId;
  state.status = STATES.IDLE;
  render();
  startGeneration(message.text);
}

function handleCheckpoint(){
  checkpointCounter++;
  state.checkpoints.push({
    id:'cp'+checkpointCounter,
    index: state.history.length,
    label: `Checkpoint ${checkpointCounter}`
  });
  render();
}

/* Rewind(): truncate history to the checkpoint's index, return to WaitingUser */
function rewindTo(cp){
  state.history = state.history.slice(0, cp.index);
  state.checkpoints = state.checkpoints.filter(c=>c.index <= cp.index);
  state.status = state.history.length ? STATES.WAITING : STATES.IDLE;
  render();
}

sendBtn.addEventListener('click', handleSend);
stopBtn.addEventListener('click', handleStop);
checkpointBtn.addEventListener('click', handleCheckpoint);

/* seed */
render();
</script>
</body>
</html>
